        function setNicknameMode(mode) {
            currentNicknameMode = mode;
            document.getElementById('tab-name').classList.toggle('active', !mode);
            document.getElementById('tab-nick').classList.toggle('active', mode);
            renderRoster();
        }

        // 명단 렌더링
        function renderRoster() {
            const container = document.getElementById('roster-list-target');
            container.innerHTML = '';

            ROSTER_NAMES.forEach((name, index) => {
                const rank = index + 1;
                const isActive = ACTIVE_RANKS.includes(rank);
                const displayLabel = currentNicknameMode ? (NICKNAMES[rank] || name) : name;

                const item = document.createElement('div');
                item.className = `roster-item ${isActive ? 'active' : ''}`;
                
                if (isActive) {
                    item.onclick = () => showDetail(rank);
                }

                item.innerHTML = `
                    <span class="pl-display rank-num">${rank}位</span>
                    <span class="char-name-label">${displayLabel}</span>
                    ${!isActive ? '<span class="lock-status">🔒 추후 공개 예정</span>' : ''}
                `;
                container.appendChild(item);
            });
        }

        // 상세조회 주입
        function showDetail(rank) {
            const p = PROFILES[rank];
            if (!p) return;

            document.getElementById('detail-header-title').innerText = `RANK ${rank} DOSSIER`;
            const target = document.getElementById('detail-target');

            let basicsHtml = p.basics.map(([k, v]) => `<p class="info-p"><b>${k}</b>${v}</p>`).join('');
            let appearanceHtml = p.appearance.map(([k, v]) => `<p class="info-p"><b>${k}</b> — ${v}</p>`).join('');
            let personalityHtml = p.personality.map(([k, v]) => `
                <div class="personality-box">
                    <div class="personality-title">${k}</div>
                    <p class="personality-p">${v}</p>
                </div>
            `).join('');
            
            let likesHtml = p.likes.map(t => `<span class="pl-tag">${t}</span>`).join('');
            let dislikesHtml = p.dislikes.map(t => `<span class="pl-tag">${t}</span>`).join('');
            let dialoguesHtml = p.dialogues.map(([k, v]) => `
                <div class="dialogue-card">
                    <div class="dialogue-kind">${k}</div>
                    "${v}"
                </div>
            `).join('');

            target.innerHTML = `
                <div class="detail-profile">
                    <img src="${IMG[rank]}" alt="${p.name}" class="detail-img">
                    <div><span class="rank-badge">RANK ${rank} · 72 DEMONS</span></div>
                    <h2 class="pl-display" style="font-size: 28px; color: #f3e7c9; letter-spacing: 2px; margin: 10px 0 4px;">${p.name}</h2>
                    <p class="detail-title">${p.title}</p>
                </div>

                <div class="detail-quote">${p.quote}</div>

                <div class="section">
                    <div class="pl-display section-title">BASICS</div>
                    ${basicsHtml}
                </div>

                <div class="section">
                    <div class="pl-display section-title">APPEARANCE</div>
                    ${appearanceHtml}
                </div>

                <div class="section">
                    <div class="pl-display section-title">PERSONALITY</div>
                    ${personalityHtml}
                    <div class="tag-box likes" style="margin-top: 14px;">
                        <div class="tag-box-title">♥ LIKES</div>
                        <div class="tags-wrapper">${likesHtml}</div>
                    </div>
                    <div class="tag-box dislikes">
                        <div class="tag-box-title">✕ DISLIKES</div>
                        <div class="tags-wrapper">${dislikesHtml}</div>
                    </div>
                </div>

                <div class="section">
                    <div class="pl-display section-title">DIALOGUE</div>
                    ${dialoguesHtml}
                </div>

                <div class="section">
                    <div class="pl-display section-title">TRIVIA</div>
                    <p class="personality-p">${p.trivia}</p>
                </div>

                <p style="text-align: center; font-size: 11px; color: #6a5f50; padding: 10px 0 0; margin: 0;">
                    ※ 마성적 표현·청불 묘사가 포함된 캐릭터입니다. 전체 본문은 다운로드 카드에서 확인하세요.
                </p>
            `;

            changeView('detail');
        }

        // 초기 실행
        renderRoster();
    </script>
</body>
</html>
